<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>혼밥러 · 커뮤니티</title>
    <link rel="stylesheet" href="style.css?v=17" />
    <style>
        .post-card {
            background: #0e1322;
            border: 1px solid #22283a;
            border-radius: 12px;
            padding: 14px;
            margin-top: 12px
        }

        .post-title {
            font-weight: 800;
            font-size: 16px;
            margin: 0 0 4px 0
        }

        .post-meta {
            font-size: 12px;
            color: #9aa0a6;
            margin: 4px 0 8px 0
        }

        .post-body {
            white-space: pre-wrap;
            line-height: 1.5
        }

        .row-wrap {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .muted-sm {
            color: #9aa0a6;
            font-size: 12px
        }

        .anon-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            justify-content: flex-start;
            white-space: nowrap;
        }

            .anon-wrap input {
                margin: 0
            }

        .comment-wrap {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #2a3145;
        }

        .comment-item {
            padding: 8px 10px;
            border: 1px solid #22283a;
            background: #0c1220;
            border-radius: 10px;
            margin-top: 8px;
        }

        .comment-meta {
            font-size: 11px;
            color: #9aa0a6;
            margin-bottom: 4px
        }

        .comment-form {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }

            .comment-form .c-text {
                flex: 1 1 240px;
            }

            .comment-form .c-anon-label {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                white-space: nowrap;
            }

        @media (max-width: 380px) {
            .comment-form {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <button id="logoutFab" class="btn outline" style="position:fixed; right:16px; top:14px; z-index:1000; padding:6px 12px; font-size:14px; width:auto;">
        로그아웃
    </button>

    <div class="container">
        <div class="topbar">
            <div class="header" style="margin:0">
                <div class="logo">🍚</div>
                <h1 class="title">혼밥러 · 커뮤니티</h1>
            </div>
            <div class="row-wrap">
                <a class="link-btn" href="match.html">매칭</a>
                <a class="link-btn" href="profile.html">프로필</a>
                <a class="link-btn" href="index.html">홈</a>
            </div>
        </div>

        <div class="card">
            <h2 class="title" style="font-size:18px;margin-top:0">게시글 쓰기</h2>
            <label>제목</label>
            <input id="title" type="text" placeholder="예: 오늘 점심 혼밥 후기" maxlength="120" />
            <label>내용</label>
            <textarea id="body" rows="6" placeholder="예: 추천 식당/음악/유튜브/영화/드라마 등 자유롭게"></textarea>

            <label class="anon-wrap">
                <input id="anon" type="checkbox" />
                <span class="muted-sm">익명</span>
            </label>

            <div class="row" style="margin-top:8px">
                <button id="postBtn" class="btn" style="width:auto;min-width:120px">등록</button>
                <span id="postMsg" class="status"></span>
            </div>
        </div>

        <div class="card" style="margin-top:16px">
            <div class="topbar" style="margin-bottom:0">
                <h2 class="title" style="font-size:18px;margin:0">최신 글</h2>
                <span class="muted-sm" id="countTxt"></span>
            </div>
            <div id="list"></div>
            <button id="moreBtn" class="btn secondary" style="margin-top:12px;display:none">더 보기</button>
        </div>
    </div>

    <script src="config.js?v=26"></script>
    <script type="module" src="./firebase.js?v=34"></script>
    <script type="module">
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

        const $ = (s) => document.querySelector(s);
        const list = $("#list"), moreBtn = $("#moreBtn"), countTxt = $("#countTxt"), postBtn = $("#postBtn"),
            postMsg = $("#postMsg"), titleEl = $("#title"), bodyEl = $("#body"), anonEl = $("#anon");

        const logoutFab = document.getElementById("logoutFab");
        logoutFab?.addEventListener("click", async () => {
            try { if (window.fbReady) await window.fbReady; await window.fb.logout(); } catch { } finally { location.href = "login.html"; }
        });

        const esc = (s) => (s || "").replace(/[&<>"']/g, m => ({
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            "\"": "&quot;",
            "'": "&#39;"
        }[m]));

        const linkify = (html) =>
            (html || "").replace(
                /(https?:\/\/[^\s<]+)/g,
                '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
            );

        function applyLikeVisual(btn, liked) {
            if (!btn) return;
            btn.style.borderColor = "#ef4444";
            if (liked) {
                btn.style.backgroundColor = "#ef4444";
                btn.style.color = "#ffffff";
            } else {
                btn.style.backgroundColor = "#0e1322";
                btn.style.color = "#ef4444";
            }
        }

        if (window.fbReady) await window.fbReady;
        await window.fb.requireAuth();
        const cu = window.fb.auth.currentUser;
        if (!cu || cu.isAnonymous) {
            alert("로그인이 필요합니다.");
            location.href = "login.html";
            throw new Error("anonymous session");
        }

        const MY_UID = cu.uid;
        const MY_EMAIL = (cu.email || "").toLowerCase();
        const IS_ADMIN = window.fb.isAdminEmail?.(MY_EMAIL) === true;
        const db = window.fb.db;

        function canEditOrDelete(post) {
            const byUid = post.authorUid && post.authorUid === MY_UID;
            const byEmail = (post.authorEmail || "").toLowerCase() === MY_EMAIL;
            return IS_ADMIN || byUid || byEmail;
        }

        /* ===== 댓글 렌더링 유틸 ===== */
        function renderCommentItem(c, { postId, canManage, onDelete }) {
            const div = document.createElement("div");
            div.className = "comment-item";
            const who = c.authorDisplay || (c.authorEmail ? c.authorEmail.split("@")[0] : "익명");
            const when = c.createdAt?.toDate ? c.createdAt.toDate().toLocaleString() : "";

            div.innerHTML = `
                <div class="comment-meta">${esc(who)} · ${when}</div>
                <div class="comment-text">${linkify(esc(c.text || ""))}</div>
                <div class="muted-sm" style="margin-top:4px; display:flex; align-items:center; gap:6px;">
                    <button class="link-btn c-like-btn" style="padding:2px 8px; font-size:11px; border-color:#ef4444; color:#ef4444;">좋아요</button>
                    <span><b class="c-likecnt">0</b></span>
                </div>
            `;

            const likeBtn = div.querySelector(".c-like-btn");
            const likeCntEl = div.querySelector(".c-likecnt");

            if (likeBtn && likeCntEl && window.fb.onCommentLikeCount) {
                let liked = false;
                applyLikeVisual(likeBtn, liked);

                (async () => {
                    try {
                        const ref = doc(db, "posts", postId, "comments", c.id, "likes", MY_UID);
                        const snap = await getDoc(ref);
                        liked = snap.exists();
                        applyLikeVisual(likeBtn, liked);
                    } catch { }
                })();

                const un = window.fb.onCommentLikeCount(postId, c.id, (n) => {
                    likeCntEl.textContent = String(n);
                });
                window.addEventListener("beforeunload", () => { try { un && un(); } catch { } });

                likeBtn.addEventListener("click", async () => {
                    try {
                        likeBtn.disabled = true;
                        await window.fb.toggleCommentLike(postId, c.id);
                        liked = !liked;
                        applyLikeVisual(likeBtn, liked);
                    } catch (e) {
                        alert("좋아요 실패: " + (e.message || e));
                    } finally {
                        likeBtn.disabled = false;
                    }
                });
            }

            if (canManage) {
                const btn = document.createElement("button");
                btn.textContent = "삭제";
                btn.className = "link-btn";
                btn.style.borderColor = "#ef4444";
                btn.style.color = "#ef4444";
                btn.style.marginTop = "6px";
                btn.addEventListener("click", async () => {
                    if (confirm("댓글을 삭제할까요?")) {
                        await onDelete().catch(e => alert("삭제 실패: " + (e.message || e)));
                    }
                });
                div.appendChild(btn);
            }
            return div;
        }

        async function renderCommentsBlock(post, wrap) {
            const block = document.createElement("div");
            block.className = "comment-wrap";
            block.innerHTML = `
                <div class="muted-sm" style="margin-bottom:6px">댓글</div>
                <div class="comment-list"></div>
                <div class="comment-form">
                    <input class="c-text" type="text" placeholder="댓글을 입력하세요" />
                    <label class="c-anon-label">
                        <input type="checkbox" class="c-anon" />
                        <span class="muted-sm">익명</span>
                    </label>
                    <button class="btn" style="width:auto;min-width:88px">등록</button>
                </div>
                <p class="c-msg status"></p>
            `;
            wrap.appendChild(block);

            const listEl = block.querySelector(".comment-list");
            const textEl = block.querySelector(".c-text");
            const anonChk = block.querySelector(".c-anon");
            const btnEl = block.querySelector(".btn");
            const msgEl = block.querySelector(".c-msg");

            async function reload() {
                listEl.innerHTML = "";
                const items = await window.fb.listComments(post.id, { take: 50 }).catch(() => []);
                (items || []).forEach(c => {
                    const canManage = IS_ADMIN ||
                        (c.authorUid === MY_UID) ||
                        ((c.authorEmail || "").toLowerCase() === MY_EMAIL);
                    const node = renderCommentItem(c, {
                        postId: post.id,
                        canManage,
                        onDelete: () => window.fb.deleteComment(post.id, c.id).then(reload)
                    });
                    listEl.appendChild(node);
                });
                if (!listEl.children.length) {
                    const empty = document.createElement("div");
                    empty.className = "muted-sm";
                    empty.textContent = "첫 댓글을 남겨보세요!";
                    listEl.appendChild(empty);
                }
            }
            await reload();

            btnEl.addEventListener("click", async () => {
                try {
                    msgEl.className = "status";
                    msgEl.textContent = "";
                    const t = (textEl.value || "").trim();
                    if (!t) {
                        msgEl.className = "status err";
                        msgEl.textContent = "댓글을 입력하세요.";
                        return;
                    }
                    btnEl.disabled = true;
                    await window.fb.addComment(post.id, { text: t, anonymous: !!anonChk.checked });
                    textEl.value = "";
                    anonChk.checked = false;
                    msgEl.className = "status ok";
                    msgEl.textContent = "등록 완료!";
                    await reload();
                } catch (e) {
                    msgEl.className = "status err";
                    msgEl.textContent = "등록 실패: " + (e.message || e);
                } finally {
                    btnEl.disabled = false;
                }
            });
        }
        /* ===== 댓글 유틸 끝 ===== */

        function renderPostCard(p) {
            const wrap = document.createElement("div");
            wrap.className = "post-card";
            const display = p.authorDisplay || (p.authorEmail ? p.authorEmail.split("@")[0] : "익명");
            const when = p.createdAt?.toDate ? p.createdAt.toDate().toLocaleString() : "";

            wrap.innerHTML = `
                <h3 class="post-title">${esc(p.title)}</h3>
                <div class="post-meta">${esc(display)} · ${when}</div>
                <div class="post-body">${linkify(esc(p.body))}</div>
                <div class="row post-like-row" style="gap:8px; margin-top:8px; align-items:center;">
                    <button class="link-btn post-like-btn" style="border-color:#ef4444; color:#ef4444;">좋아요</button>
                    <span class="muted-sm"><b class="post-like-cnt">0</b></span>
                </div>
                <div class="row post-actions" style="gap:8px; margin-top:6px"></div>
            `;

            const likeBtn = wrap.querySelector(".post-like-btn");
            const likeCntEl = wrap.querySelector(".post-like-cnt");

            if (likeBtn && likeCntEl && window.fb.onLikeCount) {
                let liked = false;
                applyLikeVisual(likeBtn, liked);

                (async () => {
                    try {
                        const ref = doc(db, "posts", p.id, "likes", MY_UID);
                        const snap = await getDoc(ref);
                        liked = snap.exists();
                        applyLikeVisual(likeBtn, liked);
                    } catch { }
                })();

                const un = window.fb.onLikeCount(p.id, (n) => {
                    likeCntEl.textContent = String(n);
                });
                window.addEventListener("beforeunload", () => { try { un && un(); } catch { } });

                likeBtn.addEventListener("click", async () => {
                    try {
                        likeBtn.disabled = true;
                        await window.fb.togglePostLike(p.id);
                        liked = !liked;
                        applyLikeVisual(likeBtn, liked);
                    } catch (e) {
                        alert("좋아요 실패: " + (e.message || e));
                    } finally {
                        likeBtn.disabled = false;
                    }
                });
            }

            const actionsRow = wrap.querySelector(".post-actions");
            if (canEditOrDelete(p)) {
                const editBtn = document.createElement("button");
                editBtn.className = "link-btn";
                editBtn.textContent = "수정";
                editBtn.style.borderColor = "var(--accent)";
                editBtn.style.color = "var(--accent)";
                editBtn.addEventListener("click", async () => {
                    const nt = prompt("새 제목을 입력하세요", p.title ?? "");
                    if (nt == null) return;
                    const nb = prompt("새 내용을 입력하세요", p.body ?? "");
                    if (nb == null) return;
                    try {
                        await window.fb.updatePost(p.id, { title: nt, body: nb });
                        p.title = nt;
                        p.body = nb;
                        wrap.querySelector(".post-title").textContent = nt;
                        wrap.querySelector(".post-body").innerHTML = linkify(esc(nb));
                    } catch (e) {
                        alert("수정 실패: " + (e.message || e));
                    }
                });
                actionsRow.appendChild(editBtn);

                const delBtn = document.createElement("button");
                delBtn.textContent = "삭제";
                delBtn.className = "link-btn";
                delBtn.style.borderColor = "#ef4444";
                delBtn.style.color = "#ef4444";
                delBtn.addEventListener("click", async () => {
                    if (!confirm("정말 삭제할까요?")) return;
                    try {
                        await window.fb.deletePost(p.id);
                        wrap.remove();
                        const left = list.querySelectorAll(".post-card").length;
                        countTxt.textContent = left ? `총 ${left}개` : "";
                    } catch (e) {
                        alert("삭제 실패: " + (e.message || e));
                    }
                });
                actionsRow.appendChild(delBtn);
            }

            // ✅ 신고 버튼 (내 글이 아닐 때만 표시)
            if (!canEditOrDelete(p)) {
                const rptBtn = document.createElement("button");
                rptBtn.textContent = "신고";
                rptBtn.className = "link-btn";
                rptBtn.style.borderColor = "#f59e0b";
                rptBtn.style.color = "#f59e0b";
                rptBtn.addEventListener("click", async () => {
                    const reason = prompt("신고 사유를 입력하세요.\n(예: 욕설, 스팸, 혐오 발언 등)");
                    if (reason === null) return;
                    if (!reason.trim()) { alert("신고 사유를 입력해주세요."); return; }
                    try {
                        await window.fb.reportUser({
                            targetUid: p.authorUid,
                            targetEmail: p.authorEmail,
                            reason: reason.trim(),
                            context: "community"
                        });
                        alert("신고가 접수되었습니다. 검토 후 조치하겠습니다.");
                    } catch (e) {
                        alert("신고 실패: " + (e.message || e));
                    }
                });
                actionsRow.appendChild(rptBtn);
            }

            // 댓글 블록
            renderCommentsBlock(p, wrap);

            list.appendChild(wrap);
        }

        postBtn?.addEventListener("click", async () => {
            try {
                postMsg.className = "status";
                postMsg.textContent = "";
                const title = (titleEl.value || "").trim();
                const body = (bodyEl.value || "").trim();
                const anonymous = !!anonEl.checked;
                if (!title) {
                    postMsg.className = "status err";
                    postMsg.textContent = "제목을 입력하세요.";
                    return;
                }
                postBtn.disabled = true;
                await window.fb.createPost({ title, body, anonymous });
                titleEl.value = "";
                bodyEl.value = "";
                anonEl.checked = false;
                postMsg.className = "status ok";
                postMsg.textContent = "등록 완료!";
                list.innerHTML = "";
                await loadMore();
            } catch (e) {
                postMsg.className = "status err";
                postMsg.textContent = "등록 실패: " + (e.message || e);
            } finally {
                postBtn.disabled = false;
            }
        });

        async function loadMore() {
            try {
                const items = await window.fb.listPosts({ take: 20 }) || [];
                (Array.isArray(items) ? items : (items.items || [])).forEach(renderPostCard);
                moreBtn.style.display = "none";
                const n = list.querySelectorAll(".post-card").length;
                countTxt.textContent = n ? `총 ${n}개` : "";
            } catch (e) {
                console.error(e);
                postMsg.className = "status err";
                postMsg.textContent = "목록을 불러오지 못했어요.";
            }
        }
        await loadMore();
    </script>
</body>
</html>
